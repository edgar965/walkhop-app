name: iOS Build & TestFlight

# Baut die WalkHop-MAUI-App auf macOS, signiert sie und laedt sie zu TestFlight hoch –
# nach dem ERPROBTEN CleanOrga-Muster (gleiches Apple-Team E7F22WZ26P).
#
# AUSLOESER: NUR manuell ("Run workflow" / workflow_dispatch). DU entscheidest, WANN ein
# Build hochgeladen wird – ein git push laedt NICHTS hoch. Ab dem Klick laeuft ALLES
# automatisch, ohne Handarbeit:
#   bauen -> signieren -> .ipa -> Upload zu TestFlight.
# - Build-Nummer (CFBundleVersion) = Lauf-Nummer (automatisch, kein Handbump; jeder Upload
#   bekommt so eine eindeutige, steigende Nummer, die Apple akzeptiert).
# - Anzeige-Version (CFBundleShortVersionString) = die LOKALE ApplicationDisplayVersion
#   aus der .csproj (z. B. 0.3.32) – also genau wie lokal.
# - Interne TestFlight-Tester ("Testintern") erhalten den Build nach der Verarbeitung
#   automatisch (Export-Compliance ist in der Info.plist gesetzt -> kein manueller Schritt).
#
# Noetige Repo-Secrets: APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
#   APP_STORE_CONNECT_PRIVATE_KEY (.p8), IOS_DISTRIBUTION_CERTIFICATE_BASE64,
#   IOS_DISTRIBUTION_CERTIFICATE_PASSWORD (.p12), IOS_PROVISIONING_PROFILE_BASE64.
#   Repo-Variablen: IOS_BUNDLE_ID, IOS_SIGNING_IDENTITY ("Apple Distribution: Edgar Maass (E7F22WZ26P)").

on:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT: WalkHop/WalkHop.csproj

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Xcode 26.6 wählen
        # .NET-iOS-SDK (26.5.10301+) verlangt Xcode 26.6; der Runner hat es installiert
        # (Default ist noch 26.5). Bei künftigen SDK-Bumps hier nachziehen.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      - name: .NET einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: MAUI-Workloads installieren
        run: dotnet workload install maui

      - name: Signing-Zertifikat in Keychain importieren
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/app-signing.keychain-db
          KCPASS=$(openssl rand -base64 32)
          echo -n "$P12_BASE64" | base64 --decode -o $CERT
          security create-keychain -p "$KCPASS" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KCPASS" $KEYCHAIN
          security import $CERT -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPASS" $KEYCHAIN 2>/dev/null || true
          security find-identity -v -p codesigning $KEYCHAIN
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> $GITHUB_ENV

      - name: Provisioning-Profil installieren
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PP_BASE64" | base64 --decode -o $PP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP))
          cp $PP ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Profil installiert, UUID: $UUID"

      - name: Build & Archive (signiert) → .ipa
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-ios -c Release \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ApplicationId=${{ vars.IOS_BUNDLE_ID }} \
            -p:ApplicationTitle=WalkHop \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:CodesignKey="${{ vars.IOS_SIGNING_IDENTITY }}"

      - name: IPA als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: walkhop-ios
          path: '**/*.ipa'
          if-no-files-found: error

      - name: Zu TestFlight hochladen (App Store Connect API)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          IPA=$(find . -name "*.ipa" -type f | head -1)
          [ -z "$IPA" ] && { echo "Keine .ipa gefunden!"; exit 1; }
          echo "Lade hoch: $IPA"
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID" 2>&1 | tee /tmp/up.txt
          grep -q "ERROR" /tmp/up.txt && { echo "::error::Upload fehlgeschlagen"; exit 1; }
          echo "Upload erfolgreich!"
